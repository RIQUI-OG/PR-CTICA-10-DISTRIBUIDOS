timeout: '3600s'
steps:
  # ==========================================
  # SERVICIO: NotasWeb
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-notas-web'
    dir: 'NotasWeb'
    args: ['build', '-t', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-notas-web'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-notas-web'
    args: [
      'run', 'deploy', 'pr10-notas-web',
      '--image', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}',
      '--region', 'northamerica-northeast2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  # ==========================================
  # SERVICIO: notes-api
  # ==========================================
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-notes-api'
    dir: 'notes-api'
    args: ['build', '-t', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-notes-api'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-notes-api'
    args: [
      'run', 'deploy', 'pr10-notes-api',
      '--image', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}',
      '--region', 'northamerica-northeast2',
      '--platform', 'managed',
      '--allow-unauthenticated',
      '--port', '8000'
    ]

images:
  - 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}'
  - 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY