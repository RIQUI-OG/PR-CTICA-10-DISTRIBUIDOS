timeout: '3600s'
steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build NotasWeb'
    dir: 'NotasWeb' 
    args: ['build', '-t', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push NotasWeb'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy NotasWeb'
    args: ['run', 'deploy', 'pr10-notas-web', '--image', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}', '--region', 'northamerica-northeast2', '--platform', 'managed', '--allow-unauthenticated']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build notes-api'
    dir: 'notes-api'
    args: ['build', '-t', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push notes-api'
    args: ['push', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}']

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Deploy notes-api'
    args: ['run', 'deploy', 'pr10-notes-api', '--image', 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}', '--region', 'northamerica-northeast2', '--platform', 'managed', '--allow-unauthenticated']

images:
  - 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notas-web:${COMMIT_SHA}'
  - 'northamerica-northeast2-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/notes-api:${COMMIT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY