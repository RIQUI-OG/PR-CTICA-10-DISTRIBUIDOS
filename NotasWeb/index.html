<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema Distribuido — Práctica 8</title>
    <style>
        :root {
            --bg-main: #1a1a2e;
            --bg-panel: #16213e;
            --bg-input: #0d1117;
            --bg-entry: #21262d;
            --cyan: #00d4ff;
            --green: #00ff88;
            --purple: #d2a8ff;
            --red: #ff4d4d;
            --text: #c9d1d9;
            --gray: #555577;
            --dark-gray: #444466;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Consolas', monospace;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        header {
            background-color: var(--bg-panel);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #0f172a;
        }

        header h1 {
            font-size: 16px;
            color: var(--cyan);
            font-weight: bold;
        }

        #user-badge {
            color: var(--green);
            font-size: 14px;
        }

        /* Main Dashboard Layout */
        main {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 10px;
            overflow: hidden;
        }

        /* Left Side: Chat Workspace */
        .chat-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-main);
        }

        .section-label {
            font-size: 12px;
            color: var(--gray);
            margin-bottom: 4px;
        }

        #chat-box {
            flex: 1;
            background-color: var(--bg-input);
            border-radius: 4px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 14px;
        }

        /* Chat Message Tags */
        .msg { line-height: 1.4; }
        .msg .time { color: var(--dark-gray); margin-right: 6px; }
        .msg.sistema { color: var(--gray); font-style: italic; }
        .msg.notas { color: var(--purple); }
        .msg.alerta { color: var(--red); font-weight: bold; }
        .msg.propio .sender { color: #79c0ff; }
        .msg.otro .sender { color: var(--green); }

        /* Input Controls */
        .input-area {
            display: flex;
            background-color: var(--bg-entry);
            margin-top: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        #btn-send {
            background-color: #238636;
            color: white;
            border: none;
            padding: 0 24px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #btn-send:hover { background-color: #2ea043; }

        /* Quick Actions Bar */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-action {
            background-color: var(--bg-panel);
            color: var(--text);
            border: 1px solid #30363d;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover { background-color: #30363d; }
        .btn-action.red:hover { background-color: #7a1515; border-color: var(--red); color: white;}

        /* Right Side: Sidebar Panel */
        sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
            min-width: 250px;
        }

        .panel {
            background-color: var(--bg-panel);
            border-radius: 4px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .users-panel { flex: 1; }
        #users-list {
            flex: 1;
            background-color: var(--bg-input);
            border-radius: 4px;
            padding: 8px;
            list-style: none;
            overflow-y: auto;
            color: var(--green);
            font-size: 13px;
        }
        #users-list li { padding: 4px 0; }

        /* Notes Management Panel */
        .notes-panel { flex: 2; overflow: hidden; }
        .note-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        .note-form input, .note-form textarea {
            background-color: var(--bg-input);
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 6px;
            color: white;
            font-size: 12px;
            outline: none;
        }
        .note-form button {
            background-color: #21262d;
            color: var(--purple);
            border: 1px solid #30363d;
            padding: 6px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .note-form button:hover { background-color: #30363d; }

        #notes-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .note-card {
            background-color: var(--bg-input);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid var(--purple);
            position: relative;
        }
        .note-card h4 { color: var(--purple); font-size: 13px; margin-bottom: 2px; }
        .note-card p { font-size: 12px; color: #8b949e; }
        .note-card .btn-del {
            position: absolute;
            top: 6px;
            right: 6px;
            background: transparent;
            border: none;
            color: #f85149;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
        }

        /* Console Footer Log */
        footer {
            background-color: var(--bg-main);
            padding: 0 10px 10px 10px;
        }
        #console-log {
            height: 80px;
            background-color: var(--bg-input);
            border-radius: 4px;
            padding: 8px;
            overflow-y: auto;
            font-size: 11px;
            color: #6e7681;
            white-space: pre-wrap;
        }

        /* Modal Auth Overlap */
        #login-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(13, 17, 23, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-box {
            background-color: var(--bg-panel);
            padding: 30px;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #30363d;
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }
        .modal-box h2 { color: var(--cyan); margin-bottom: 15px; font-size: 18px; }
        .modal-box input {
            background-color: var(--bg-input);
            border: 1px solid #30363d;
            padding: 10px;
            color: white;
            border-radius: 4px;
            margin-bottom: 15px;
            width: 250px;
            text-align: center;
            font-size: 14px;
        }
        .modal-box button {
            background-color: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Input oculto para subida de archivos (Media API) -->
    <input type="file" id="file-input" style="display:none;" onchange="subirImagen(event)" accept="image/png, image/jpeg">

    <div id="login-modal">
        <div class="modal-box">
            <h2>💬 Ingresa tu nombre de usuario:</h2>
            <input type="text" id="username-input" placeholder="Ej. Ricardo" autocomplete="off">
            <br>
            <button onclick="inicializarCliente()">Entrar al Sistema</button>
        </div>
    </div>

    <header>
        <h1>💬 ECOSISTEMA DISTRIBUIDO (6 Microservicios)</h1>
        <div id="user-badge">● Desconectado</div>
    </header>

    <main>
        <div class="chat-container">
            <div class="section-label">MENSAJES DEL SERVIDOR (Usa comandos: /nota, /media, /geo, /alerta)</div>
            <div id="chat-box"></div>
            
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Escribe un mensaje..." autocomplete="off">
                <button id="btn-send" onclick="procesarEntradaInput()">Enviar</button>
            </div>

            <!-- Botones de Acción Rápida para detonar APIs -->
            <div class="quick-actions">
                <button class="btn-action" onclick="document.getElementById('file-input').click()">🖼️ Subir Imagen (Media API)</button>
                <button class="btn-action" onclick="manejarGeo()">📍 Compartir Ubicación (Geo API)</button>
                <button class="btn-action red" onclick="manejarAlerta()">🚨 Detonar Alerta (Geo API)</button>
            </div>
        </div>

        <sidebar>
            <div class="panel users-panel">
                <div class="section-label" style="color: var(--cyan); font-weight: bold;">CONECTADOS</div>
                <ul id="users-list"></ul>
            </div>

            <div class="panel notes-panel">
                <div class="section-label" style="color: var(--purple); font-weight: bold;">📝 MICROSERVICIO NOTAS</div>
                <div class="note-form">
                    <input type="text" id="note-title" placeholder="Título de la nota">
                    <textarea id="note-text" placeholder="Contenido..." rows="2"></textarea>
                    <button onclick="uiAgregarNota()">Crear Nota</button>
                </div>
                <div id="notes-list"></div>
            </div>
        </sidebar>
    </main>

    <footer>
        <div class="section-label">TELEMETRÍA (LOGGER API) Y PETICIONES HTTP</div>
        <div id="console-log"></div>
    </footer>

    <script>
        // ── Endpoints de Producción (Google Cloud Run) ──
        const URL_NOTAS  = "https://notes-api-547885514709.europe-west1.run.app";
        const URL_AUTH   = "https://auth-api-547885514709.europe-west1.run.app";
        const URL_MEDIA  = "https://media-api-547885514709.northamerica-northeast2.run.app";
        const URL_GEO    = "https://geo-api-547885514709.europe-west1.run.app";
        const URL_LOGGER = "https://logger-api-547885514709.northamerica-northeast2.run.app";
        const URL_CHAT   = "https://chat-server-547885514709.europe-west1.run.app";

        let usuario = "";
        let ultimoId = 0;

        // Escucha la tecla Enter en los inputs
        document.getElementById('username-input').addEventListener('keypress', e => { if(e.key === 'Enter') inicializarCliente(); });
        document.getElementById('message-input').addEventListener('keypress', e => { if(e.key === 'Enter') procesarEntradaInput(); });

        function logHttp(texto) {
            const consoleBox = document.getElementById('console-log');
            const time = new Date().toLocaleTimeString();
            consoleBox.innerHTML += `[${time}] ${texto}\n`;
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // ── Central Logger ──
        async function registrarLog(servicio, nivel, mensaje) {
            try {
                await fetch(`${URL_LOGGER}/log`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ service: servicio, level: nivel, message: mensaje })
                });
            } catch(e) {}
        }

        async function inicializarCliente() {
            const input = document.getElementById('username-input');
            usuario = input.value.trim();
            if(!usuario) return alert("Por favor ingresa un nombre válido");

            // 1. Simulación de Validación en Auth API (Puerto 8001)
            try {
                await fetch(`${URL_AUTH}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: "Ricardo", password: "123" }) 
                });
                registrarLog("auth-api", "INFO", `Intento de inicio de sesión de ${usuario}`);
            } catch (err) {}

            logHttp(`Intentando POST Chat /unirse para usuario: ${usuario}`);
            try {
                // 2. Unirse al Chat Server (Puerto 9000)
                const res = await fetch(`${URL_CHAT}/unirse`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuario })
                });
                
                if(res.ok) {
                    document.getElementById('login-modal').style.display = 'none';
                    document.getElementById('user-badge').innerText = `● ${usuario}`;
                    document.getElementById('message-input').focus();
                    
                    registrarLog("chat-client", "SUCCESS", `${usuario} conectado al frontend web.`);

                    setInterval(hiloPolling, 1000);
                    setInterval(hiloHeartbeat, 5000);
                    
                    uiListarNotas();
                    imprimirLocal("SISTEMA", `*** Bienvenido al ecosistema distribuido, ${usuario} ***`);
                } else {
                    alert("El servidor de chat rechazó la solicitud.");
                }
            } catch (err) {
                console.error(err);
                alert(`Error crítico de conexión. Verifica que "docker compose up" esté corriendo.`);
            }
        }

        // ── Polling del Chat ──
        async function hiloPolling() {
            try {
                const resMsg = await fetch(`${URL_CHAT}/mensajes?desde=${ultimoId}`);
                if(resMsg.ok) {
                    const data = await resMsg.json();
                    const nuevos = data.mensajes || [];
                    if(nuevos.length > 0) {
                        nuevos.forEach(msg => mostrarMensajeUI(msg));
                        logHttp(`GET Chat /mensajes?desde=${ultimoId} → ${nuevos.length} nuevo(s)`);
                        ultimoId = nuevos[nuevos.length - 1].id;
                    }
                }

                if(Math.floor(Date.now() / 1000) % 3 === 0) {
                    const resUsr = await fetch(`${URL_CHAT}/usuarios`);
                    if(resUsr.ok) {
                        const dataUsr = await resUsr.json();
                        actualizarUsuariosUI(dataUsr.usuarios || []);
                    }
                }
            } catch (err) {}
        }

        async function hiloHeartbeat() {
            try {
                await fetch(`${URL_CHAT}/heartbeat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuario })
                });
            } catch(e){}
        }

        async function enviarMensajeChat(texto) {
            try {
                const res = await fetch(`${URL_CHAT}/mensajes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuario, texto: texto })
                });
                logHttp(`POST Chat /mensajes → ${res.ok ? '200 OK' : 'ERROR'}`);
            } catch (err) {
                logHttp(`POST Chat /mensajes → FALLO DE RED`);
            }
        }

        // ── Funciones Microservicio NOTAS (Puerto 8000) ──
        async function uiAgregarNota() {
            const titleInput = document.getElementById('note-title');
            const textInput = document.getElementById('note-text');
            const t = titleInput.value.trim();
            const n = textInput.value.trim();
            
            if(!t || !n) return alert("Completa título y contenido");

            try {
                const res = await fetch(`${URL_NOTAS}/${usuario}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: t, note: n })
                });
                logHttp(`POST Notas /${usuario} → ${res.status}`);
                if(res.status === 201) {
                    titleInput.value = "";
                    textInput.value = "";
                    registrarLog("notes-api", "INFO", `${usuario} creó la nota: ${t}`);
                    imprimirLocal("API_NOTAS", `Nota creada exitosamente: '${t}'`);
                    uiListarNotas();
                }
            } catch(e) {
                imprimirLocal("API_NOTAS", "Fallo de conexión al guardar nota.");
            }
        }

        async function uiListarNotas() {
            try {
                const res = await fetch(`${URL_NOTAS}/${usuario}`);
                if(res.status === 200) {
                    const notas = await res.json();
                    const container = document.getElementById('notes-list');
                    container.innerHTML = "";
                    notas.forEach(n => {
                        container.innerHTML += `
                            <div class="note-card">
                                <h4>${n.title}</h4>
                                <p>${n.note}</p>
                                <button class="btn-del" onclick="uiEliminarNota(${n.id})">X</button>
                            </div>
                        `;
                    });
                }
            } catch(e){}
        }

        async function uiEliminarNota(id) {
            try {
                const res = await fetch(`${URL_NOTAS}/${usuario}/${id}`, { method: 'DELETE' });
                logHttp(`DELETE Notas /${usuario}/${id} → ${res.status}`);
                if(res.status === 204) {
                    registrarLog("notes-api", "INFO", `${usuario} eliminó una nota.`);
                    imprimirLocal("API_NOTAS", `Nota purgada del sistema.`);
                    uiListarNotas();
                }
            } catch(e){}
        }

        // ── Funciones Microservicio GEO/ALERTS (Puerto 8003) ──
        async function manejarGeo() {
            const payload = { usuario: usuario, lat: 19.362, lng: -99.294 };
            logHttp(`POST Geo /location → ${JSON.stringify(payload)}`);
            try {
                const res = await fetch(`${URL_GEO}/location`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
            });
            if(res.ok) {
            enviarMensajeChat(`📍 Ubicación actual: Lat ${payload.lat}, Lng ${payload.lng} (Cuajimalpa, CDMX).`);
            registrarLog("geo-api", "INFO", `Coordenadas recibidas de ${usuario}`);
        }
    } catch(e) { logHttp(`ERROR GEO API: ${e}`); }
}

        async function manejarAlerta() {
            const payload = { usuario: usuario, tipo_alerta: "PÁNICO", audio_stream_url: "wss://stream.audio.local/live" };
                logHttp(`POST Geo /emergency → ${JSON.stringify(payload)}`);
             try {
            const res = await fetch(`${URL_GEO}/emergency`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
        });
            if(res.ok) {
                enviarMensajeChat(`🚨 ¡ALERTA DE ${payload.tipo_alerta}! Transmitiendo mensaje de alerta`);
                registrarLog("geo-api", "WARNING", `ALERTA GLOBAL detonada por ${usuario}`);
        }
    } catch(e) { logHttp(`ERROR GEO API: ${e}`); }
}

        // ── Funciones Microservicio MEDIA (Puerto 8002) ──
        async function subirImagen(event) {
            const file = event.target.files[0];
            if(!file) return;
            
            logHttp(`POST Media /upload/image → Subiendo blob...`);
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${URL_MEDIA}/upload/image`, {
                    method: 'POST',
                    body: formData
                });
                if(res.ok) {
                    const data = await res.json();
                    enviarMensajeChat(`🖼️ [IMAGEN SUPABASE] ${data.storage_url}`);
                    registrarLog("media-api", "INFO", `Blob ${file.name} subido a Supabase.`);
                } else {
                    logHttp(`ERROR: El servidor rechazó el archivo.`);
                }
            } catch(e) { logHttp(`ERROR MEDIA API: ${e}`); }
            event.target.value = ''; // Reset input
        }

        // ── Procesamiento de Input ──
        function procesarEntradaInput() {
            const input = document.getElementById('message-input');
            const texto = input.value.trim();
            if(!texto) return;
            input.value = "";

            if(texto.startsWith('/nota')) {
                manejarComandoConsolaNotas(texto);
            } else if(texto.startsWith('/media')) {
                document.getElementById('file-input').click();
            } else if(texto.startsWith('/geo')) {
                manejarGeo();
            } else if(texto.startsWith('/alerta')) {
                manejarAlerta();
            } else {
                enviarMensajeChat(texto);
            }
        }

        function manejarComandoConsolaNotas(texto) {
            const partes = texto.split(' ');
            const comando = partes[1] || '';

            if(comando === 'add') {
                const resto = texto.substring(10).split('|');
                const t = resto[0] ? resto[0].trim() : '';
                const n = resto[1] ? resto[1].trim() : 'Sin descripción';
                if(!t) return imprimirLocal("API_NOTAS", "Usa: /nota add Título | Contenido");
                
                fetch(`${URL_NOTAS}/${usuario}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: t, note: n })
                }).then(res => {
                    logHttp(`POST Notas /${usuario} → ${res.status}`);
                    if(res.status === 201) {
                        imprimirLocal("API_NOTAS", `Nota creada: '${t}'`);
                        uiListarNotas();
                    }
                });
            } else if(comando === 'list') {
                uiListarNotas();
            } else if(comando === 'del') {
                const id = parseInt(partes[2]);
                if(isNaN(id)) return imprimirLocal("API_NOTAS", "El ID debe ser número.");
                uiEliminarNota(id);
            } else {
                imprimirLocal("API_NOTAS", "Comando inválido.");
            }
        }

        // ── Renderizadores ──
        function mostrarMensajeUI(msg) {
            const box = document.getElementById('chat-box');
            const hora = msg.timestamp || new Date().toLocaleTimeString();
            const usr = msg.usuario;
            const txt = msg.texto;
            
            let claseType = "otro";
            if(usr === "SISTEMA") claseType = "sistema";
            else if(usr === "API_NOTAS") claseType = "notas";
            else if(usr === usuario) claseType = "propio";

            if (txt.includes('🚨') || txt.includes('📍')) claseType += " alerta";

            let item = "";
            if(usr === "SISTEMA") {
                item = `<div class="msg sistema">  ${txt}</div>`;
            } else if(usr === "API_NOTAS") {
                item = `<div class="msg notas"><span class="time">[${hora}]</span> 📝 [NOTAS]: ${txt}</div>`;
            } else {
                const displaySender = usr === usuario ? "Tú" : usr;
                item = `<div class="msg ${claseType}"><span class="time">[${hora}]</span><span class="sender">${displaySender}:</span> ${txt}</div>`;
            }

            box.innerHTML += item;
            box.scrollTop = box.scrollHeight;
        }

        function actualizarUsuariosUI(lista) {
            const ul = document.getElementById('users-list');
            ul.innerHTML = "";
            lista.forEach(u => {
                const prefijo = u === usuario ? "► " : "  ";
                ul.innerHTML += `<li>${prefijo}${u}</li>`;
            });
        }

        function imprimirLocal(origen, texto) {
            mostrarMensajeUI({
                usuario: origen,
                texto: texto,
                timestamp: new Date().toLocaleTimeString()
            });
        }

        window.addEventListener('beforeunload', () => {
            navigator.sendBeacon(`${URL_CHAT}/salir`, JSON.stringify({ usuario: usuario }));
        });
    </script>
</body>
</html>
